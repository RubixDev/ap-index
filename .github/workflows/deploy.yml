name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore cached worlds
        id: restore-cache
        uses: actions/cache/restore@v5
        with:
          path: worlds
          key: ${{ runner.os }}-worlds-${{ hashFiles('index.toml') }}
          restore-keys: |
            ${{ runner.os }}-worlds-

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
            context: .
            load: true
            tags: ap-index:latest
            cache-from: type=gha
            cache-to: type=gha,mode=max

      - name: Generate schemas
        run: docker run --rm -v ./schema:/app/schema -v ./worlds:/app/custom_worlds ap-index:latest

      - name: Cache worlds
        uses: actions/cache/save@v5
        if: always()
        with:
          path: worlds
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}

      - name: Prepare deployment
        run: |
          rm .gitignore

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./schema
